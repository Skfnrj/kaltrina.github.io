<!DOCTYPE html>
<html>
<head>
    <title>My Site</title>

    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Pixelify Sans', monospace;
            background: linear-gradient(to bottom, #000000, #12001f);
            color: white;
            text-align: center;
            margin: 0;
            padding-top: 60px;
            min-height: 100vh;
        }

        h1 {
            color: #40E0D0;
            font-size: 52px;
            text-shadow:
                2px 2px 0 black,
                4px 4px 0 #003333;
            margin-bottom: 30px;
        }

        p {
            color: #EE82EE;
            font-size: 28px;
            text-shadow: 2px 2px 0 black;
            margin: 20px 0;
        }

	        .flip-card {
            background-color: transparent;
            width: 300px;
            height: 200px;
            margin: 50px auto;
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid #40E0D0;
            border-radius: 10px;
            box-shadow: 0 0 15px #40E0D0;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
        }

        .flip-card-front {
            background-color: #111;
            color: #40E0D0;
        }

        .flip-card-back {
            background-color: #220033;
            color: #EE82EE;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>
    <h1>Hello, GitHub Pages!</h1>
    <p>This is my first website.</p>
    <p>This is my second update for the Git homework assignment.</p>

 <div class="flip-card" onclick="this.classList.toggle('flipped')">
        <div class="flip-card-inner">

            <div class="flip-card-front">
                <h2>About Me</h2>
                <p>Click to flip</p>
            </div>

            <div class="flip-card-back">
                <h2>Kaltrina</h2>
                <p>Computer Science student.</p>
                <p>Learning Git & GitHub.</p>
                <p>Hobbies: reading, playing the piano, movies.</p>
            </div>

        </div>
    </div>
</body>
</html>
