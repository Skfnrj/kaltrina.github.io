<!DOCTYPE html>
<html>
<head>
    <title>My Site</title>

    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Pixelify Sans', monospace;
            background: linear-gradient(to bottom, #000000, #12001f);
            color: white;
            text-align: center;
            margin: 0;
            padding-top: 60px;
            min-height: 100vh;
        }

        h1 {
            color: #40E0D0;
            font-size: 52px;
            text-shadow:
                2px 2px 0 black,
                4px 4px 0 #003333;
            margin-bottom: 30px;
        }

        p {
            color: #EE82EE;
            font-size: 28px;
            text-shadow: 2px 2px 0 black;
            margin: 20px 0;
        }

	        .flip-card {
            background-color: transparent;
            width: 320px;
            height: 260px;
            margin: 50px auto;
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid #40E0D0;
            border-radius: 12px;
            box-shadow: 0 0 15px #40E0D0;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;		
	    overflow: hidden;
        }

        .flip-card-front {
            background-color: #111;
            color: #40E0D0;
        }

        .flip-card-back {
            background-color: #220033;
            color: #EE82EE;
            transform: rotateY(180deg);
        }

 	.flip-card-front h2,
        .flip-card-back h2 {
            margin: 0 0 15px 0;
            font-size: 28px;
        }

        .flip-card-front p,
        .flip-card-back p {
            margin: 8px 0;
            font-size: 18px;
            line-height: 1.4;
            text-shadow: none;
        }

	.theme-btn {
    		margin-top: 20px;
   		padding: 10px 20px;
    		font-family: 'Pixelify Sans', monospace;
    		font-size: 16px;
    		border: 2px solid #40E0D0;
    		background-color: black;
    		color: #40E0D0;
    		cursor: pointer;
    		box-shadow: 0 0 10px #40E0D0;
}

	.theme-btn:hover {
    		background-color: #40E0D0;
    		color: black;
	}

	.neon {
    		background: linear-gradient(to bottom, #000000, #001a1a);
	}

	.neon h1 {
    		color: #00ffff;
    		text-shadow: 0 0 15px #00ffff;
	}

	.neon p {
    		color: #ff00ff;
	}	
    </style>
</head>
<body>
    <h1>Hello, GitHub Pages!</h1>
    <p>This is my first website.</p>
    <p>This is my second update for the Git homework assignment.</p>

<button onclick="toggleTheme()" class="theme-btn">Toggle Theme</button>

 <div class="flip-card" onclick="this.classList.toggle('flipped')">
        <div class="flip-card-inner">

            <div class="flip-card-front">
                <h2>About Me</h2>
                <p>Click to flip</p>
            </div>

            <div class="flip-card-back">
                <h2>Kaltrina</h2>
                <p>Computer Science student</p>
                <p>Learning Git & GitHub</p>
                <p>Hobbies: reading, piano, movies</p>
            </div>
        </div>
    </div>
<script>
function toggleTheme() {
    document.body.classList.toggle("neon");
}
</script>
</body>
</html>
